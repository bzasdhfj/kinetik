name: CheckInApp
options:
  bundleIdPrefix: com.checkin
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: "$(TARGET_NAME)"

targets:
  CheckInApp:
    type: application
    platform: macOS
    sources:
      - CheckInApp
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.checkin.calendar
        CODE_SIGN_ENTITLEMENTS: CheckInApp/CheckInApp.entitlements
        INFOPLIST_FILE: CheckInApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: CheckInWidgetExtension

  CheckInWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - CheckInWidget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.checkin.calendar.widget
        CODE_SIGN_ENTITLEMENTS: CheckInWidget/CheckInWidget.entitlements
        INFOPLIST_FILE: CheckInWidget/Info.plist
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
